<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WSOP 2026 Trip Guide Offline</title>
    <meta name="theme-color" content="#172033">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f7f3ea;
        color: #172033;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.65;
      }

      main {
        width: min(520px, 100%);
        padding: 22px;
        border: 1px solid rgba(23, 32, 51, 0.14);
        border-radius: 8px;
        background: #fffdf8;
        box-shadow: 0 16px 42px rgba(23, 32, 51, 0.1);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 16px;
        color: #5e6b7b;
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        padding: 0 14px;
        border-radius: 7px;
        background: #d79b2c;
        color: #231705;
        font-weight: 900;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>オフラインです</h1>
      <p>一度開いたページや資料は端末に残っていれば表示できます。未保存の資料は通信が戻ってから開いてください。</p>
      <a href="./">しおりへ戻る</a>
    </main>
  </body>
</html>
