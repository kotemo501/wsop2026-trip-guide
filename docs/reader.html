<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    <title>WSOP 2026 Trip Guide Reader</title>
    <link rel="stylesheet" href="reader.css">
  </head>
  <body>
    <header class="reader-header">
      <a href="../index.html#library">資料へ戻る</a>
      <span>WSOP 2026 Trip Guide</span>
    </header>

    <main class="reader-shell">
      <article class="reader-card">
        <div class="reader-meta">
          <div>
            <span data-doc-label>Travel Note</span>
            <small>Updated: 2026-06-20 JST</small>
          </div>
          <div class="reader-actions">
            <button type="button" data-copy-link>リンク</button>
            <button type="button" data-print-doc>印刷</button>
          </div>
        </div>
        <nav class="reader-toc" data-reader-toc aria-label="資料内ナビゲーション" hidden></nav>
        <div class="reader-content" data-reader-content>
          <h1>読み込み中</h1>
          <p>資料を開いています。</p>
        </div>
        <nav class="reader-related" id="next-docs" data-reader-related aria-label="次に開く資料" hidden></nav>
      </article>
    </main>

    <nav class="reader-dock" aria-label="資料リーダー固定ナビゲーション">
      <a href="reader.html?doc=today-command.md">今日</a>
      <a href="reader.html?doc=confirmed-bookings.md">予約</a>
      <a href="reader.html?doc=sos-quick-card.md">SOS</a>
      <a href="reader.html?doc=pocket-itinerary.md">旅程</a>
    </nav>

    <script src="reader.js"></script>
  </body>
</html>
